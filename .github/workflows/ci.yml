name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - debug/photobrief-edits
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Install, lint, typecheck, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      GPTFULL: ${{ secrets.GPTFULL }}
      PUPPETEER_SKIP_DOWNLOAD: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Confirm GPTFULL secret is available
        shell: bash
        run: |
          if [ -z "$GPTFULL" ]; then
            echo "GPTFULL secret is not available to this workflow."
            exit 1
          fi
          echo "GPTFULL secret is configured."

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
